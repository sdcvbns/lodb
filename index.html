<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إدارة IPTV | سرمد</title>
    <style>
        :root { --accent: #00f2fe; --bg: #0f172a; --card-glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; width: 100%; max-width: 420px; text-align: center; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 18px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 14px; border: none; background: transparent; color: white; cursor: pointer; transition: 0.4s; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0, 0, 0, 0.3); color: #fff; outline: none; box-sizing: border-box; }
        #mainAdd { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .clear-btn { background: #ff4d4d; color: white; border: none; padding: 12px; border-radius: 15px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: 600; }
        .list-container { width: 100%; max-width: 420px; margin-top: 30px; }
        .list-item { background: rgba(255, 255, 255, 0.03); border-radius: 20px; padding: 18px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border-right: 5px solid var(--accent); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-mini { padding: 8px 12px; border-radius: 10px; border: none; font-size: 0.75rem; cursor: pointer; font-weight: 600; margin-left: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h3>نظام الإدارة الذكي</h3>
        <div class="tabs">
            <button class="tab-btn active" id="xtBtn" onclick="switchTab('xtream')">Xtream</button>
            <button class="tab-btn" id="m3uBtn" onclick="switchTab('m3u')">M3U</button>
        </div>
        <div id="xt-fields">
            <input type="text" id="host" placeholder="رابط السيرفر">
            <input type="text" id="user" placeholder="اليوزر">
            <input type="text" id="pass" placeholder="الباسورد">
        </div>
        <div id="m3u-fields" class="hidden">
            <label style="font-size: 0.8rem; cursor: pointer; border: 1px dashed var(--accent); display: block; padding: 10px; border-radius: 12px; margin-bottom: 10px;">
                📁 رفع ملف M3U من الجهاز
                <input type="file" id="fileInput" class="hidden" accept=".m3u" onchange="handleFileUpload(this)">
            </label>
            <input type="text" id="m3u_name" placeholder="اسم القائمة">
            <input type="text" id="m3u_url" placeholder="أو رابط M3U مباشر">
        </div>
        <select id="status"><option value="active">تفعيل ✅</option><option value="expired">إيقاف ❌</option></select>
        <button id="mainAdd" onclick="addNew()">إضافة وحفظ البيانات ✅</button>
        <button class="clear-btn" onclick="clearAllData()">مسح القائمة بالكامل 🗑️</button>
        <div id="msg" style="margin-top:10px; color:var(--accent); font-size: 0.8rem;"></div>
    </div>
    <div class="list-container" id="list"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbywEI0J7rXCOqY1xlu88L1h-0DrV38cVNwSGGIL5YFzU8roI-p10IbsDYpyMKmZcBPb/exec";
    let subs = []; let mode = 'xtream';

    window.onload = load;
    function switchTab(m) {
        mode = m;
        document.getElementById('xtBtn').classList.toggle('active', m==='xtream');
        document.getElementById('m3uBtn').classList.toggle('active', m==='m3u');
        document.getElementById('xt-fields').classList.toggle('hidden', m!=='xtream');
        document.getElementById('m3u-fields').classList.toggle('hidden', m!=='m3u');
    }

    async function load() {
        try {
            const res = await fetch(API);
            subs = await res.json();
            render();
        } catch(e) { console.error(e); }
    }

    function render() {
        const div = document.getElementById('list');
        div.innerHTML = '';
        subs.forEach((s, i) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            if(s.status === 'expired') item.style.borderRightColor = '#ff4d4d';
            item.innerHTML = `
                <div><b>${s.type==='m3u'?s.name:s.user}</b></div>
                <div>
                    <button class="btn-mini" style="background:rgba(255,255,255,0.1);color:#fff" onclick="toggle(${i})">حالة</button>
                    <button class="btn-mini" style="background:#ff4d4d;color:#fff" onclick="del(${i})">حذف</button>
                </div>`;
            div.appendChild(item);
        });
    }

    async function sync() {
        document.getElementById('msg').innerText = "جاري الحفظ...";
        await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({data: subs}) });
        setTimeout(() => { document.getElementById('msg').innerText = "تم التحديث ✅"; load(); }, 2000);
    }

    async function clearAllData() {
        if(confirm("هل أنت متأكد من مسح كافة البيانات؟")) {
            document.getElementById('msg').innerText = "جاري مسح الكل...";
            await fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({action: "clear_all"}) });
            setTimeout(() => { load(); document.getElementById('msg').innerText = "تم المسح ✅"; }, 2000);
        }
    }

    function addNew() {
        let n = { status: document.getElementById('status').value, type: mode };
        if(mode === 'xtream') {
            n.host = document.getElementById('host').value; n.user = document.getElementById('user').value; n.pass = document.getElementById('pass').value;
            if(!n.user) return;
        } else {
            n.name = document.getElementById('m3u_name').value; n.url = document.getElementById('m3u_url').value;
            if(!n.url) return;
        }
        subs.push(n); sync();
    }

    function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let name = "";
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith("#EXTINF:")) name = line.split(',').pop();
                else if (line.startsWith("http")) {
                    subs.push({ type: 'm3u', name: name || "قناة مرفوعة", url: line, status: 'active' });
                    name = "";
                }
            });
            render();
        };
        reader.readAsText(file);
    }

    function del(i) { if(confirm("حذف هذا العنصر؟")) { subs.splice(i,1); sync(); } }
    function toggle(i) { subs[i].status = subs[i].status==='active'?'expired':'active'; sync(); }
</script>
</body>
</html>
